<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>26-2 인하대 전기전자공학부 시간표</title>
    <style>
        * { box-sizing: border-box; font-family: 'Malgun Gothic', sans-serif; }
        body { display: flex; margin: 0; padding: 20px; background-color: #f9f9f9; height: 100vh; overflow: hidden; }
        
        /* 왼쪽 과목 목록 구역 */
        #sidebar { width: 350px; background: white; border-right: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; height: 100%; box-shadow: 2px 0 5px rgba(0,0,0,0.05); z-index: 20; }
        h2 { margin-top: 0; color: #c62917; font-size: 18px; border-bottom: 2px solid #c62917; padding-bottom: 10px; }
        #search { padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; width: 100%; font-size: 14px; }
        
        /* 학년 및 범주 필터 스타일 */
        #grade-filter-container { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; padding: 2px; }
        #grade-filter-container label { font-size: 13px; color: #444; cursor: pointer; display: flex; align-items: center; gap: 4px; user-select: none; padding: 4px 0; }
        #grade-filter-container input[type="checkbox"] { cursor: pointer; transform: scale(1.2); }

        #course-list { flex: 1; overflow-y: auto; }
        .course-item { padding: 15px 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        .course-item:hover { background-color: #f5f5f5; }
        .course-item.selected { background-color: #ffeaea; border-left: 4px solid #c62917; }
        .course-id { font-size: 12px; color: #888; }
        .course-name { font-weight: bold; font-size: 15px; color: #333; margin: 4px 0; }
        .course-info { font-size: 13px; color: #565656; }
        
        /* 오른쪽 시간표 구역 */
        #timetable-container { flex: 1; padding: 0 20px; display: flex; flex-direction: column; height: 100%; overflow-y: auto; overflow-x: auto; }
        #timetable-wrapper { min-width: 600px; position: relative; margin-top: 10px; }
        
        /* 절대 위치 카드의 기준점(relative) 역할을 하도록 설정 */
        #timetable { display: grid; grid-template-columns: 60px repeat(5, 1fr); border-top: 1px solid #ddd; border-left: 1px solid #ddd; background: white; position: relative; }
        
        .cell { border-right: 1px solid #ddd; border-bottom: 1px solid #ddd; min-height: 40px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #666; }
        .header-cell { background-color: #f1f1f1; font-weight: bold; color: #333; height: 40px; }
        .time-cell { background-color: #f9f9f9; font-weight: bold; font-size: 11px; }
        
        /* 시간표 위에 배치되는 절대 위치 카드 */
        .schedule-card { position: absolute; color: white; padding: 6px; font-size: 11px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; pointer-events: auto; z-index: 10; line-height: 1.3; }
        .schedule-card .delete-btn { align-self: flex-end; background: none; border: none; color: white; cursor: pointer; font-weight: bold; font-size: 14px; padding: 0px 4px; line-height: 1; }
        
        /* 시간 미지정 과목 리스트 */
        #no-time-container { margin-top: 20px; background: white; border: 1px solid #ddd; padding: 15px; border-radius: 4px; min-width: 300px; }
        #no-time-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .no-time-item { background: #eee; padding: 8px 12px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .no-time-delete { border: none; background: transparent; color: #888; cursor: pointer; font-weight: bold; font-size: 16px; padding: 0 4px; }

        @media (max-width: 768px) {
            body { flex-direction: column; padding: 0; }
            #sidebar { width: 100%; height: 45vh; border-right: none; border-bottom: 2px solid #ddd; padding: 15px 15px 5px 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
            #timetable-container { width: 100%; height: 55vh; padding: 15px; }
            h2 { font-size: 16px; margin-bottom: 8px; }
            .schedule-card { font-size: 10px; padding: 4px; }
        }
    </style>

        const days = ['월', '화', '수', '목', '금'];
        const startHour = 9;
        const endHour = 23; 
        const totalHours = endHour - startHour;

        const cardColors = [
            'rgba(198, 41, 23, 0.85)',   // 레드
            'rgba(41, 128, 185, 0.85)',  // 블루
            'rgba(39, 174, 96, 0.85)',   // 그린
            'rgba(142, 68, 173, 0.85)',  // 퍼플
            'rgba(230, 126, 34, 0.85)',  // 오렌지
            'rgba(22, 160, 133, 0.85)',  // 민트
            'rgba(44, 62, 80, 0.85)',    // 다크네이비
            'rgba(127, 140, 141, 0.85)'  // 그레이
        ];

        const courses = rawData.trim().split('\n').map((line, index) => {
            const tokens = line.split('\t').map(t => t.trim());
            const id = tokens[0];
            const name = tokens[1];
            const professor = tokens[2];
            
            const combinedTimeStr = tokens.slice(3).filter(t => t.length > 0).join(' ');
            const times = [];
            
            if (combinedTimeStr) {
                const regex = /([월화수목금])\s*(\d{2}:\d{2}~\d{2}:\d{2})/g;
                let match;
                while ((match = regex.exec(combinedTimeStr)) !== null) {
                    const day = match[1];
                    const [start, end] = match[2].split('~');
                    times.push({ day, start: start.trim(), end: end.trim() });
                }
            }

            return { 
                dbId: index, 
                id, 
                name, 
                professor, 
                times, 
                timeStr: times.length > 0 ? tokens.slice(3).filter(t => t.length > 0).join(', ') : '웹강의',
                color: cardColors[index % cardColors.length]
            };
        });

        let selectedCourses = [];

        const courseListEl = document.getElementById('course-list');
        const timetableEl = document.getElementById('timetable');
        const searchInput = document.getElementById('search');
        const noTimeListEl = document.getElementById('no-time-list');

        function initTimetableGrid() {
            timetableEl.innerHTML = '';
            timetableEl.appendChild(createCell('', 'header-cell'));
            days.forEach(day => timetableEl.appendChild(createCell(day, 'header-cell')));

            for (let h = startHour; h < endHour; h++) {
                timetableEl.appendChild(createCell(`${h}:00`, 'time-cell'));
                for(let d=0; d<5; d++) timetableEl.appendChild(createCell('', ''));
                timetableEl.appendChild(createCell(`${h}:30`, 'time-cell'));
                for(let d=0; d<5; d++) timetableEl.appendChild(createCell('', ''));
            }
        }

        function createCell(text, className) {
            const cell = document.createElement('div');
            cell.className = `cell ${className}`;
            cell.innerText = text;
            return cell;
        }

        function timeToMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function isOverlapping(newCourse) {
            if (newCourse.times.length === 0) return false;
            
            for (const enrolled of selectedCourses) {
                for (const t1 of enrolled.times) {
                    for (const t2 of newCourse.times) {
                        if (t1.day === t2.day) {
                            const start1 = timeToMinutes(t1.start);
                            const end1 = timeToMinutes(t1.end);
                            const start2 = timeToMinutes(t2.start);
                            const end2 = timeToMinutes(t2.end);
                            
                            if (start1 < end2 && start2 < end1) {
                                return enrolled.name;
                            }
                        }
                    }
                }
            }
            return null;
        }

        function renderCourseList(filterText = '') {
            courseListEl.innerHTML = '';
            const checkedGrades = Array.from(document.querySelectorAll('.grade-filter:checked')).map(cb => cb.value);

            const filtered = courses.filter(c => {
                const searchLower = filterText.toLowerCase();
                const matchesSearch = c.name.toLowerCase().includes(searchLower) || 
                                      c.professor.toLowerCase().includes(searchLower) || 
                                      c.id.toLowerCase().includes(searchLower);
                
                // 학수번호 분류 알고리즘 개선
                const idUpper = c.id.toUpperCase();
                let courseGrade = '';
                
                if (idUpper.startsWith('GEB') || idUpper.startsWith('GED') || idUpper.startsWith('GEE')) {
                    courseGrade = 'GES'; // 교양선택
                } else if (idUpper.startsWith('ACE')) {
                    courseGrade = 'GE';  // 교양필수
                } else {
                    courseGrade = c.id.charAt(3); // 전공 학년 (4번째 문자 추출)
                }

                const matchesGrade = checkedGrades.includes(courseGrade);
                
                return matchesSearch && matchesGrade;
            });

            filtered.forEach(course => {
                const item = document.createElement('div');
                const isEnrolled = selectedCourses.some(sc => sc.dbId === course.dbId);
                item.className = `course-item ${isEnrolled ? 'selected' : ''}`;
                
                item.innerHTML = `
                    <div class="course-id">${course.id}</div>
                    <div class="course-name">${course.name}</div>
                    <div class="course-info">${course.professor} | ${course.timeStr}</div>
                `;

                item.addEventListener('click', () => {
                    if (isEnrolled) {
                        removeCourse(course.dbId);
                    } else {
                        addCourse(course);
                    }
                });
                courseListEl.appendChild(item);
            });
        }

        function addCourse(course) {
            const overlapTarget = isOverlapping(course);
            if (overlapTarget) {
                alert(`⚠️ 시간이 겹칩니다!\n현재 등록된 [${overlapTarget}] 과목과 겹치는 시간대입니다.`);
                return;
            }
            selectedCourses.push(course);
            updateTimetableVisuals();
            renderCourseList(searchInput.value);
        }

        function removeCourse(dbId) {
            selectedCourses = selectedCourses.filter(sc => sc.dbId !== dbId);
            updateTimetableVisuals();
            renderCourseList(searchInput.value);
        }

        function updateTimetableVisuals() {
            noTimeListEl.innerHTML = '';
            document.querySelectorAll('.schedule-card').forEach(el => el.remove());

            const timetableWidth = timetableEl.clientWidth;
            const timeColWidth = 60; 
            const columnWidth = (timetableWidth - timeColWidth) / 5;

            const firstDataCell = timetableEl.children[6]; 
            const halfHourHeight = firstDataCell ? firstDataCell.offsetHeight : 40;
            const headerHeight = 40; 

            selectedCourses.forEach(course => {
                if (course.times.length === 0) {
                    const noTimeItem = document.createElement('div');
                    noTimeItem.className = 'no-time-item';
                    noTimeItem.innerHTML = `
                        <span>${course.name} (${course.professor})</span>
                        <button class="no-time-delete">×</button>
                    `;
                    noTimeItem.querySelector('.no-time-delete').addEventListener('click', () => removeCourse(course.dbId));
                    noTimeListEl.appendChild(noTimeItem);
                    return;
                }

                course.times.forEach(t => {
                    const dayIndex = days.indexOf(t.day);
                    if (dayIndex === -1) return;

                    const startMin = timeToMinutes(t.start);
                    const endMin = timeToMinutes(t.end);
                    const baseMin = startHour * 60;

                    const topOffset = ((startMin - baseMin) / 30) * halfHourHeight + headerHeight; 
                    const cardHeight = ((endMin - startMin) / 30) * halfHourHeight;
                    const leftOffset = timeColWidth + dayIndex * columnWidth; 

                    const card = document.createElement('div');
                    card.className = 'schedule-card';
                    card.style.top = `${topOffset}px`;
                    card.style.left = `${leftOffset}px`;
                    card.style.width = `${columnWidth}px`;
                    card.style.height = `${cardHeight}px`;
                    card.style.backgroundColor = course.color;

                    card.innerHTML = `
                        <button class="delete-btn">×</button>
                        <div>
                            <strong>${course.name}</strong><br>
                            <span style="font-size:inherit; opacity:0.9;">${course.professor}</span>
                        </div>
                        <div></div>
                    `;

                    card.querySelector('.delete-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        removeCourse(course.dbId);
                    });

                    timetableEl.appendChild(card);
                });
            });
        }

        searchInput.addEventListener('input', (e) => {
            renderCourseList(e.target.value);
        });

        document.querySelectorAll('.grade-filter').forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                renderCourseList(searchInput.value);
            });
        });

        window.addEventListener('resize', () => {
            updateTimetableVisuals();
        });

        initTimetableGrid();
        renderCourseList();
        
        window.addEventListener('load', () => {
            updateTimetableVisuals();
        });
    </script>
